import:
  - catalog/aws/api-gateway
  - catalog/aws/bootstrap
  - catalog/aws/ecr
  - catalog/aws/ecr-pull-though-cache
  - catalog/aws/eks
  - catalog/aws/eks-argocd
  - catalog/aws/eks-setup
  - catalog/aws/github-oidc
  - catalog/aws/private-domain
  - catalog/aws/secret
  - catalog/aws/vpc
  - catalog/aws/vpn

vars:
  namespace: monke
  tenant: core
  environment: dev
  stage: dev
  project: monke
  region: eu-central-1

terraform:
  backend_type: s3
  backend:
    s3:
      bucket: monke-eu-central-1-dev-iac-tofu-state
      region: eu-central-1
      encrypt: true
      use_lockfile: true
