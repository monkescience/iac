import:
  - catalog/aws/bootstrap

vars:
  namespace: monke
  tenant: core
  environment: prod
  stage: prod
  project: monke
  region: eu-central-1

terraform:
  backend_type: s3
  backend:
    s3:
      bucket: monke-eu-central-1-prod-iac-tofu-state
      region: eu-central-1
      encrypt: true
      use_lockfile: true

components:
  terraform:
    # aws/bootstrap uses committed encrypted local state; the path is stage-scoped
    # because the component dir is shared by the dev/root/prod stacks.
    aws/bootstrap:
      backend:
        local:
          path: prod.terraform.tfstate
