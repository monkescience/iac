import:
  - catalog/aws/bootstrap
  - catalog/aws/cognito
  - catalog/aws/organization
  - catalog/aws/sso

vars:
  namespace: monke
  tenant: core
  environment: root
  stage: root
  project: monke
  region: eu-central-1

terraform:
  backend_type: s3
  backend:
    s3:
      bucket: monke-eu-central-1-root-iac-tofu-state
      region: eu-central-1
      encrypt: true
      use_lockfile: true

components:
  terraform:
    # aws/bootstrap uses committed encrypted local state; the path is stage-scoped
    # because the component dir is shared by the dev/root/prod stacks.
    aws/bootstrap:
      backend:
        local:
          path: root.terraform.tfstate
