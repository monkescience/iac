base_path: .

components:
  terraform:
    base_path: components/terraform
    command: tofu
    apply_auto_approve: false
    deploy_run_init: true
    init_run_reconfigure: true
    auto_generate_backend_file: true
    workspaces_enabled: false

stacks:
  base_path: stacks
  included_paths:
    - orgs/**/*.yaml
  excluded_paths:
    - catalog/**/*.yaml
  name_pattern: "{namespace}-{stage}"

logs:
  file: /dev/stderr
  level: Info
